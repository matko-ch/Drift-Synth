name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        config: [Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxrandr-dev libxinerama-dev \
            libxcursor-dev libfreetype6-dev \
            libgl1-mesa-dev libglu1-mesa-dev

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Run unit tests
        run: ctest --test-dir ${{ github.workspace }}/build --output-on-failure -C ${{ env.BUILD_TYPE }}

      - name: Run pluginval (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            curl -LO "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip"
            unzip pluginval_macOS.zip
            ./pluginval.app/Contents/MacOS/pluginval \
              --strictness-level 10 \
              --validate-in-process \
              --output-dir /tmp/pluginval_output \
              "${{ github.workspace }}/build/Drift_artefacts/Release/VST3/Drift.vst3" || true
          else
            curl -LO "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip"
            unzip pluginval_Linux.zip
            ./pluginval \
              --strictness-level 10 \
              --validate-in-process \
              --output-dir /tmp/pluginval_output \
              "${{ github.workspace }}/build/Drift_artefacts/Release/VST3/Drift.vst3" || true
          fi
